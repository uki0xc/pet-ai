<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>River Pet 高级设置</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: rgba(255, 255, 255, 0.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .header-bg {
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      padding: 24px 20px 32px;
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.2);
      position: relative;
    }

    .header-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-subtitle {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
      margin-top: 4px;
    }

    .container {
      padding: 0 20px 24px;
      margin-top: -16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s ease;
    }

    .card:hover {
      border-color: rgba(99, 102, 241, 0.3);
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent-color);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Slider styling */
    .slider-group {
      margin-bottom: 14px;
    }

    .slider-group:last-child {
      margin-bottom: 0;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .slider-value {
      background: rgba(99, 102, 241, 0.2);
      color: #a5b4fc;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent-color);
      cursor: pointer;
      box-shadow: 0 0 10px var(--accent-color);
      transition: transform 0.1s ease;
    }

    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      background: #818cf8;
    }

    /* Info items */
    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 6px 0;
      color: var(--text-muted);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-row span:last-child {
      color: var(--text-main);
      font-weight: 500;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--accent-color) 0%, #818cf8 100%);
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      transition: all 0.2s ease;
      margin-top: auto;
    }

    .btn:hover {
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.5);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(1px);
    }

    /* Theme Switching Grid */
    .theme-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .theme-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-align: center;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .theme-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
    }

    .theme-btn.active {
      background: rgba(99, 102, 241, 0.25);
      border-color: var(--accent-color);
      color: #a5b4fc;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="header-bg">
    <div class="header-title">⚙️ 桌宠偏好设置</div>
    <div class="header-subtitle">实时调整画面比例与运行参数</div>
  </div>

  <div class="container">
    <!-- 缩放设置 -->
    <div class="card">
      <div class="card-title">🔍 发呆单帧图缩放实时控制</div>
      
      <div class="slider-group">
        <div class="slider-header">
          <span>图片一 (cat_daze.png)</span>
          <span class="slider-value" id="val-daze">1.35x</span>
        </div>
        <input type="range" id="slider-daze" min="0.8" max="2.0" step="0.05" value="1.35">
      </div>

      <div class="slider-group">
        <div class="slider-header">
          <span>图片二 (cat_daze2.png)</span>
          <span class="slider-value" id="val-daze2">1.25x</span>
        </div>
        <input type="range" id="slider-daze2" min="0.8" max="2.0" step="0.05" value="1.25">
      </div>
    </div>

    <!-- 宠物品种选择 -->
    <div class="card">
      <div class="card-title">🐱 桌宠切换</div>
      <div class="theme-grid">
        <div class="theme-btn active" data-theme="oolong">乌龙茶</div>
        <div class="theme-btn" data-theme="tiger">虎皮卷</div>
        <div class="theme-btn" data-theme="car">小车</div>
      </div>
    </div>

    <!-- 运行状态信息 -->
    <div class="card">
      <div class="card-title">ℹ️ 应用详情</div>
      <div class="info-row">
        <span>当前交互逻辑</span>
        <span>直接变体交替切换</span>
      </div>
      <div class="info-row">
        <span>手动锁定保持期</span>
        <span>维持 10 分钟</span>
      </div>
      <div class="info-row">
        <span>渲染引擎</span>
        <span>代码级 60FPS 平滑驱动</span>
      </div>
      <div class="info-row">
        <span>开发环境支持</span>
        <span>Tauri v2 跨平台原生框架</span>
      </div>
    </div>

    <button class="btn" id="btn-save">完成并关闭设置</button>
  </div>

  <script>
    const { getCurrentWindow } = window.__TAURI__.window;

    // 获取并填充初始值
    const sliderDaze = document.getElementById('slider-daze');
    const sliderDaze2 = document.getElementById('slider-daze2');
    const valDaze = document.getElementById('val-daze');
    const valDaze2 = document.getElementById('val-daze2');

    const savedDaze = localStorage.getItem('pet_daze_scale');
    if (savedDaze) {
      sliderDaze.value = savedDaze;
      valDaze.textContent = savedDaze + 'x';
    }

    const savedDaze2 = localStorage.getItem('pet_daze2_scale');
    if (savedDaze2) {
      sliderDaze2.value = savedDaze2;
      valDaze2.textContent = savedDaze2 + 'x';
    }

    // 实时更新数值并广播至主窗口
    sliderDaze.addEventListener('input', (e) => {
      const v = e.target.value;
      valDaze.textContent = v + 'x';
      localStorage.setItem('pet_daze_scale', v);
    });

    sliderDaze2.addEventListener('input', (e) => {
      const v = e.target.value;
      valDaze2.textContent = v + 'x';
      localStorage.setItem('pet_daze2_scale', v);
    });

    // 宠物品种选择逻辑
    const themeBtns = document.querySelectorAll('.theme-btn');
    const currentSavedTheme = localStorage.getItem('pet_current_theme') || 'oolong';
    
    themeBtns.forEach(btn => {
      if (btn.dataset.theme === currentSavedTheme) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }

      btn.addEventListener('click', () => {
        themeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        localStorage.setItem('pet_current_theme', btn.dataset.theme);
      });
    });

    // 监听 storage 变更自动同步高亮（例如用户在右键菜单一键换宠）
    window.addEventListener('storage', (e) => {
      if (e.key === 'pet_current_theme') {
        themeBtns.forEach(b => {
          b.classList.toggle('active', b.dataset.theme === e.newValue);
        });
      }
    });

    // 关闭窗口
    document.getElementById('btn-save').addEventListener('click', async () => {
      try {
        await getCurrentWindow().close();
      } catch (err) {
        console.error('Failed to close window', err);
        window.close();
      }
    });
  </script>
</body>
</html>

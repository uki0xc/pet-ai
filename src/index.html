<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>River Pet</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="pet-canvas" width="500" height="500"></canvas>
    <img id="pet-webp" class="hidden" style="position: absolute; top: 0; left: 0; width: 500px; height: 500px; object-fit: contain; pointer-events: none; user-select: none;" />
    
    <!-- Right-click context menu (内容由 JS 根据当前品种动态生成) -->
    <div id="context-menu" class="context-menu hidden">
      <div class="menu-header">🐱 桌宠菜单</div>
      <div id="menu-body"></div>
      <div class="menu-divider"></div>
      <div class="menu-grid">
        <div class="menu-item" data-action="settings">⚙️ 设置</div>
        <div class="menu-item menu-item-danger" data-action="quit">❌ 退出</div>
      </div>
    </div>

    <!-- Floating status bubble -->
    <div id="status-bubble" class="status-bubble hidden">
      <span id="status-text"></span>
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
